name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: 'Publish to PyPI?'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write

jobs:
  # ── Verify CI Passed ───────────────────────────────────────────
  verify-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CI status
        run: |
          echo "Checking if CI workflows have passed..."
          # This would typically check the CI workflow status
          # For now, just ensure the code is clean
          echo "✅ CI verification placeholder"

  # ── Build Release ───────────────────────────────────────────────
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: verify-ci
    outputs:
      version: ${{ steps.version.outputs.version }}
      wheel: ${{ steps.build.outputs.wheel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation
      
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | awk -F'"' '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Install build tools
        run: pip install build
      
      - name: Build distributions
        id: build
        run: |
          python -m build
          WHEEL=$(ls dist/*.whl | head -1 | xargs basename)
          echo "wheel=$WHEEL" >> $GITHUB_OUTPUT
          echo "Built: $WHEEL"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
          retention-days: 5

  # ── Generate Changelog ─────────────────────────────────────────
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: build-release
    outputs:
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog
        id: changelog
        run: |
          # Simple changelog generation from git log
          CHANGELOG=$(git log --oneline --no-decorate $(git describe --tags --abbrev=0 2>/dev/null || echo 'HEAD~1')..HEAD | head -20 || echo "See git log for details")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes in ${{ needs.build-release.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, generate-changelog]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          name: distributions
          path: dist/
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ needs.build-release.outputs.version }}
          body: ${{ needs.generate-changelog.outputs.changelog }}
          draft: false
          prerelease: false
      
      - name: Upload wheel to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/${{ needs.build-release.outputs.wheel }}
          asset_name: ${{ needs.build-release.outputs.wheel }}
          asset_content_type: application/octet-stream
      
      - name: Upload sdist to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/cmdpop-*.tar.gz
          asset_name: cmdpop-${{ needs.build-release.outputs.version }}.tar.gz
          asset_content_type: application/gzip

  # ── Publish to PyPI ────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-release, create-release]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/cmdpop/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          name: distributions
          path: dist/
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true

  # ── Notification ───────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-release, publish-pypi]
    if: always()
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.publish-pypi.result }}" == "success" ]]; then
            echo "✅ Release ${{ needs.build-release.outputs.version }} published to PyPI"
          elif [[ "${{ needs.publish-pypi.result }}" == "skipped" ]]; then
            echo "⏭️ Release skipped (not a tag push)"
          else
            echo "❌ Release failed"
            exit 1
          fi
